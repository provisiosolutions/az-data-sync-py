<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync Session Reviewer</title>
  <style>
    $css
  </style>
</head>

<body>

  <div class="page-header">
    <h1>Sync Session Reviewer</h1>
    <p class="subtitle">Browse synced recording sessions — phrases, transcriptions &amp; audio files</p>
  </div>

  <div class="summary-strip">
    <div class="summary-item">
      <div class="value">$session_count</div>
      <div class="label">Sessions</div>
    </div>
    <div class="summary-item">
      <div class="value">$total_phrases</div>
      <div class="label">Total Phrases</div>
    </div>
    <div class="summary-item">
      <div class="value">$total_files</div>
      <div class="label">Audio Files</div>
    </div>
    <div class="summary-item">
      <div class="value">$total_size</div>
      <div class="label">Total Size</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search phrases, transcriptions, session IDs…"
      oninput="filterCards()">
    <button class="btn" onclick="toggleAll(true)">Expand All</button>
    <button class="btn" onclick="toggleAll(false)">Collapse All</button>
  </div>

  <div id="sessionList">
    $cards_html
  </div>
  <div class="no-results" id="noResults">No sessions match your search.</div>

  <div class="generated-at">Generated $generated_at</div>

  <script>
    /* ── <session-card> ─────────────────────────────────────────────── */
    class SessionCard extends HTMLElement {
      connectedCallback() {
        const header = this.querySelector('.card-header');
        const body = this.querySelector('.card-body');
        const chevron = this.querySelector('.chevron');

        header?.addEventListener('click', () => {
          const open = body.style.display !== 'none';
          body.style.display = open ? 'none' : 'block';
          chevron?.classList.toggle('open', !open);
        });
      }

      get expanded() {
        return this.querySelector('.card-body')?.style.display !== 'none';
      }

      set expanded(val) {
        const body = this.querySelector('.card-body');
        const chevron = this.querySelector('.chevron');
        if (body) body.style.display = val ? 'block' : 'none';
        chevron?.classList.toggle('open', val);
      }
    }
    customElements.define('session-card', SessionCard);

    /* ── <audio-player> ─────────────────────────────────────────────── */
    class AudioPlayer extends HTMLElement {
      connectedCallback() {
        const src = this.getAttribute('src') || '';
        this.innerHTML = `<audio src="$${src}" preload="none" controls></audio>`;
        this._audio = this.querySelector('audio');

        // Pause every other player when this one starts
        this._audio.addEventListener('play', () => {
          document.querySelectorAll('audio-player').forEach(p => {
            if (p !== this && p._audio && !p._audio.paused) {
              p._audio.pause();
              p._audio.currentTime = 0;
            }
          });
        });
      }
    }
    customElements.define('audio-player', AudioPlayer);

    /* ── Global helpers ─────────────────────────────────────────────── */
    function toggleAll(expand) {
      document.querySelectorAll('session-card').forEach(c => c.expanded = expand);
    }

    function filterCards() {
      const query = document.getElementById('searchBox').value.toLowerCase().trim();
      const cards = document.querySelectorAll('session-card');
      let visible = 0;
      cards.forEach(card => {
        const match = !query || card.textContent.toLowerCase().includes(query);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
    }
  </script>
</body>

</html>
